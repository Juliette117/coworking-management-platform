server:
  port: 8090

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: member-service
          uri: lb://member-service
          predicates:
            - Path=/members/**
        - id: room-service
          uri: lb://room-service
          predicates:
            - Path=/rooms/**
        - id: reservation-service
          uri: lb://reservation-service
          predicates:
            - Path=/reservations/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761
    initial-instance-info-replication-interval-seconds: 10
    register-with-eureka: true
    fetch-registry: true





